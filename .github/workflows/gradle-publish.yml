name: ci/cd workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch: 
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6.1.0

    - name: Check project files
      run: |
        echo "현재 위치:"
        pwd
    
        echo "현재 폴더 파일:"
        ls -al
    
        echo "gradlew 위치 찾기:"
        find . -name "gradlew" -type f
    
        echo "build.gradle 위치 찾기:"
        find . -name "build.gradle" -type f
    
        echo "settings.gradle 위치 찾기:"
        find . -name "settings.gradle" -type f

    - name: Grant execute permission for Gradle
      working-directory: ./backend
      run: chmod +x gradlew
  
    - name: Build with Gradle
      working-directory: ./backend
      run: ./gradlew build -x test --no-daemon

    - name: Check build output
      run: |
        pwd
        ls -al backend/build/libs

    - name: Upload jar artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: backend/build/libs/*.jar

    - name: Prepare SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

    - name: Upload jar to server
      run: |
        JAR_FILE=$(ls backend/build/libs/*.jar | grep -v plain | head -n 1)
        echo "Deploy jar: $JAR_FILE"

        ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.SERVER_PORT }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "mkdir -p /home/github-actions/backend"

        scp -i ~/.ssh/deploy_key \
            -P "${{ secrets.SERVER_PORT }}" \
            "$JAR_FILE" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/github-actions/backend/app.jar"

        ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.SERVER_PORT }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "
            mv /home/github-actions/backend/app.jar /home/docker/scshin-dev/app.jar &&
            cd /home/docker/scshin-dev &&
            docker compose up -d --build
            docker compose ps
            "
