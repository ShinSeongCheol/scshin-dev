name: ci/cd workflow

on:
  push:
    branches: ["main"]
  pull_request: 
    branches: ["main"]
  workflow_dispatch: 
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      uses: gradle/actions@v6.1.0
