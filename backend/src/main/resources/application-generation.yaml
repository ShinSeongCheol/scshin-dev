spring:
  datasource:
    url: jdbc:h2:mem:db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
  h2:
    console:
      enabled: true
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        ddl-auto: none
      jakarta:
        persistence:
          schema-generation:
            scripts:
              action: create
              create-target: ./schema-create.sql
              create-source: metadata