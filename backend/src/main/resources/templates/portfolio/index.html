<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{portfolio/layouts/default_layout}" lang="kr">
<main layout:fragment="main">
    <section
            class="h-[calc(100vh-62px)] bg-slate-50 bg-gradient-to-b from-white to-blue-100 flex items-center justify-center">
        <div class="max-w-7xl mx-auto px-6 py-20 text-center">
            <h1 class="text-3xl md:text-5xl font-black text-slate-900 leading-tight mb-8">
                비즈니스의 목표를 <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-400">견고한 기술</span>로
                현실화하는
                <br class="hidden md:block">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-400">Full-Stack</span>
                개발자 신성철입니다.
            </h1>

            <div class="max-w-3xl mx-auto space-y-4">
                <p class="text-xl md:text-2xl font-semibold text-slate-700">
                    기술은 목적이 아닌 <span class="bg-blue-100 text-blue-700 px-2 rounded">수단</span>이라고 믿습니다.
                </p>

                <p class="text-lg text-slate-600 leading-relaxed">
                    서비스의 본질을 이해하고, 유지보수가 용이한
                    <span class="font-medium text-slate-800 underline decoration-blue-300 underline-offset-4">클린 코드</span>와
                    <span class="font-medium text-slate-800 underline decoration-blue-300 underline-offset-4">확장성 있는 아키텍처</span>를
                    통해 비즈니스의 연속성을 기여하는 데 집중합니다.
                </p>

                <p class="pt-6 text-slate-400 flex items-center justify-center gap-2">
                    <span class="w-10 h-px bg-slate-200"></span>
                    <span class="italic text-sm md:text-base">어제보다 오늘 더 나은 코드를 쓰기 위해 매일 기록하고 학습합니다.</span>
                    <span class="w-10 h-px bg-slate-200"></span>
                </p>
            </div>

            <div class="mt-12 flex justify-center gap-4">
                <a href="#projects"
                   class="px-8 py-3 bg-blue-600 text-white font-bold rounded-full hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-200">
                    프로젝트 보기
                </a>
                <a href="#"
                   class="w-12 h-12 bg-blue-600/10 rounded-full flex items-center justify-center text-white hover:bg-blue-600/20 transition-all duration-300 hover:scale-110"
                   style="opacity: 1; transform: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         class="lucide lucide-github w-5 h-5" aria-hidden="true">
                        <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
                        <path d="M9 18c-4.51 2-5-2-7-2"></path>
                    </svg>
                </a>
                <a href="#"
                   class="w-12 h-12 bg-blue-600/10 rounded-full flex items-center justify-center text-white hover:bg-blue-600/20 transition-all duration-300 hover:scale-110"
                   style="opacity: 1; transform: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         class="lucide lucide-linkedin w-5 h-5" aria-hidden="true">
                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                        <rect width="4" height="12" x="2" y="9"></rect>
                        <circle cx="4" cy="4" r="2"></circle>
                    </svg>
                </a>
                <a href="#"
                   class="w-12 h-12 bg-blue-600/10 rounded-full flex items-center justify-center text-white hover:bg-blue-600/20 transition-all duration-300 hover:scale-110"
                   style="opacity: 1; transform: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         class="lucide lucide-mail w-5 h-5" aria-hidden="true">
                        <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path>
                        <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                    </svg>
                </a>
            </div>
        </div>
    </section>
</main>
</html>
