<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{backoffice/layouts/default_layout}" lang="kr" class="scroll-smooth" data-theme="">
    <main layout:fragment="main">

        <div class="login-screen min-h-screen flex items-center justify-center bg-backoffice-primary p-6">
            <div class="login-container w-full max-w-md bg-backoffice-secondary rounded-3xl px-10 py-12 shadow-backoffice-lg border border-backoffice-border text-center">
                <div class="login-header mb-8">
                    <div class="login-logo inline-flex items-center gap-2 text-2xl font-bold mb-6">
                        <span class="logo-icon text-3xl">🔐</span>
                        <span class="logo-text text-3xl gradient-text bg-linear-to-br from-violet-500 to-fuchsia-500 bg-clip-text text-transparent">Admin</span>
                    </div>
                    <h1 class="text-2xl mb-2">관리자 로그인</h1>
                    <p class="text-backoffice-tertiary">블로그를 관리하려면 비밀번호를 입력하세요</p>
                </div>
                <form class="login-form text-left">
                    <div class="form-group mb-6">
                        <label for="adminPassword" class="block mb-2 font-semibold text-sm text-secondary">비밀번호</label>
                        <input type="password" id="adminPassword" placeholder="비밀번호를 입력하세요" required
                               autocomplete="current-password" class="w-full px-4.5 py-3.5 border-2 border-backoffice-border rounded-xl transition-all duration-150 resize-y focus:outline-none focus:border-backoffice-accent-primary focus:shadow-backoffice hover:shadow-backoffice-hover placeholder:text-tertiary">
                    </div>
                    <button type="submit" class="btn-login w-full flex items-center justify-center gap-2 px-7 py-3.5 rounded-xl font-semibold text-sm text-white bg-linear-to-br from-violet-500 to-fuchsia-500 transition-all duration-150 shadow-backoffice hover:transform hover:-transform-y-2 hover:cursor-pointer">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M13.8 12H3"></path>
                        </svg>
                        로그인
                    </button>
                </form>
                <a th:href="~{blog/index}" class="back-link inline-block mt-6 text-backoffice-tertiary text-sm transition-colors duration-150 hover:text-backoffice-accent-primary">← 블로그로 돌아가기</a>
            </div>
        </div>

    </main>
</html>
