<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{backoffice/layouts/default_layout}" lang="kr" class="scroll-smooth" data-theme="">
    <main layout:fragment="content" class="p-4 flex flex-col">

        <div th:replace="~{backoffice/fragments/content/content_heading :: pageHeadingFragment('글', '블로그의 글을 관리하세요')}"></div>

        <div class="bg-backoffice-secondary border border-backoffice-border rounded-2xl flex-1 flex flex-col shadow-sm gap-2">

            <div class="flex items-center justify-between px-6 py-5 border-b border-b-backoffice-border">
                <h3 class="flex items-center gap-2.5 text-lg font-semibold text-backoffice-text-primary m-0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-backoffice-text-tertiary">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    모든 글
                </h3>
                <span class="px-3 py-1 bg-[#6366f11a] text-backoffice-accent-primary rounded-lg text-sm font-semibold" id="categoryListCount">0개</span>
            </div>

            <table class="table-fixed mx-2 border-collapse">
                <thead>
                    <tr class="bg-gray-200 text-sm">
                        <th class="p-2 w-16">번호</th>
                        <th class="p-2 w-auto text-left">제목</th>
                        <th class="p-2 w-28">상태</th>
                        <th class="p-2 w-36">생성일</th>
                        <th class="p-2 w-36">수정일</th>
                    </tr>
                </thead>
                <tbody class="cursor-default">
                    <tr th:each="post : ${postList}" class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                        <td th:text="${post.id()}" class="p-2 text-center text-gray-500 text-sm">1</td>
                        <td class="p-2 text-left"><a th:href="@{/admin/edit/{id}(id=${post.id()})}" th:text="|${post.title()}|" class="text-blue-600 hover:underline block truncate">글 제목</a></td>
                        <td class="p-2 text-center"><span class="inline-block px-2 py-1 text-xs font-semibold rounded" th:classappend="${post.id() % 2 == 0} ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-600'" th:text="${post.id() % 2 == 0 ? 'PUBLISHED' : 'DRAFT'}">PUBLISHED</span></td>
                        <td th:text="|${#temporals.format(post.createdAt(), 'yyyy-MM-dd')}|" class="p-2 text-center text-sm text-gray-500">2026-04-07</td>
                        <td th:text="|${#temporals.format(post.updatedAt(), 'yyyy-MM-dd')}|" class="p-2 text-center text-sm text-gray-500">2026-04-07</td>
                    </tr>
                </tbody>
            </table>

            <div class="absolute bottom-10 right-10 flex justify-end gap-2 mx-2">
                <button class="px-2.5 py-1 text-xl text-white bg-indigo-500 hover:text-white hover:bg-indigo-400 hover:border-indigo-400 rounded-md font-medium transition-all hover:cursor-pointer active:scale-95 duration-200 select-none">
                    글 쓰기
                </button>
            </div>
        </div>
    </main>
    <script th:src="@{/js/backoffice/fragments/sidebar.js}"></script>
</html>
