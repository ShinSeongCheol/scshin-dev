<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{backoffice/layouts/default_layout}" lang="kr" class="scroll-smooth" data-theme="">
    <main layout:fragment="content" class="p-4 flex flex-col">

        <div th:replace="~{backoffice/fragments/content/content_heading :: pageHeadingFragment('글', '블로그의 글을 관리하세요')}"></div>

        <div class="bg-backoffice-secondary border border-backoffice-border rounded-2xl flex-1 flex flex-col shadow-sm gap-2">

            <div class="flex items-center justify-between px-6 py-5 border-b border-b-backoffice-border">
                <h3 class="flex items-center gap-2.5 text-lg font-semibold text-backoffice-text-primary m-0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-backoffice-text-tertiary">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    모든 글
                </h3>
                <span class="px-3 py-1 bg-[#6366f11a] text-backoffice-accent-primary rounded-lg text-sm font-semibold" id="categoryListCount">0개</span>
            </div>

            <div class="flex justify-end gap-2 mx-2">
                <button class="px-2.5 py-1 text-xl text-white bg-indigo-500 hover:text-white hover:bg-indigo-400 hover:border-indigo-400 rounded-md font-medium transition-all hover:cursor-pointer active:scale-95 duration-200 select-none">
                    작성
                </button>
                <button class="px-2.5 py-1 text-xl text-white bg-red-500 hover:bg-red-400 hover:border-red-400 rounded-md font-medium transition-all hover:cursor-pointer active:scale-95 duration-200 select-none" th:onclick="|deletePost(${num})|">
                    삭제
                </button>
            </div>

            <table class="table-auto border-collapse mx-2 select-none">
                <thead>
                    <tr class="bg-gray-200 border border-gray-100">
                        <th class="p-2 w-12"><input type="checkbox" id="selectAll"></th>
                        <th class="p-2 w-12">번호</th>
                        <th class="p-2 ">제목</th>
                        <th class="p-2 w-12">상태</th>
                        <th class="p-2 w-32">작성일</th>
                    </tr>
                </thead>
                <tbody class="text-center">
                    <tr th:each="num : ${#numbers.sequence(1, 10)}">
                        <td class="p-2"><input type="checkbox" name="postIds" th:value="${num}"></td>
                        <td th:text="${num}" class="p-2">1</td>
                        <td class="p-2 ">
                            <a th:href="@{/admin/edit/{id}(id=${num})}" th:text="|테스트 게시글 제목 ${num}|">글 제목</a>
                        </td>
                        <td class="p-2">
                            <span class="badge" th:classappend="${num % 2 == 0} ? 'badge-green' : 'badge-gray'" th:text="${num % 2 == 0 ? 'PUBLISHED' : 'DRAFT'}">PUBLISHED</span>
                        </td>
                        <td th:text="|2026-04-07|" class="p-2">2026-04-07</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>
    <script th:src="@{/js/backoffice/fragments/sidebar.js}"></script>
</html>
