<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{backoffice/layouts/default_layout}" lang="kr" class="scroll-smooth" data-theme="">
    <main layout:fragment="content" class="p-4 flex flex-col">

        <div th:replace="~{backoffice/fragments/content/content_heading :: pageHeadingFragment('글', '블로그의 글을 관리하세요')}"></div>

        <div class="bg-backoffice-secondary border border-backoffice-border rounded-2xl flex-1 flex flex-col shadow-sm gap-2">

            <div class="flex items-center justify-between px-6 py-5 border-b border-b-backoffice-border">
                <h3 class="flex items-center gap-2.5 text-lg font-semibold text-backoffice-text-primary m-0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-backoffice-text-tertiary">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    <span>글 목록</span>
                </h3>
                <span class="px-3 py-1 bg-[#6366f11a] text-backoffice-accent-primary rounded-lg text-sm font-semibold" id="categoryListCount" th:text="|${#lists.size(postList)}개|">0개</span>
            </div>

            <div class="bg-white mx-2 shadow overflow-hidden border border-gray-200">
                <!-- 테이블 헤더 -->
                <div class="grid grid-cols-12 bg-gray-50 p-3 text-sm font-semibold text-gray-700 border-b">
                    <div class="col-span-1 text-center">번호</div>
                    <div class="col-span-6 text-left">제목</div>
                    <div class="col-span-2 text-center">생성일</div>
                    <div class="col-span-2 text-center">수정일</div>
                    <div class="col-span-1 text-center">조회수</div>
                </div>

                <!-- 아이템 목록 -->
                <div id="post-items" class="divide-y divide-gray-100">
                    <div th:each="post : ${postList}" th:data-post-id="${post.id()}" class="post-row grid grid-cols-12 p-3 items-center hover:bg-gray-50 text-sm font-medium text-gray-900 cursor-pointer">
                        <div th:text="${post.id()}" class="col-span-1 text-center">1</div>
                        <div th:text="|${post.title()}|" class="col-span-6 flex items-center gap-2 text-blue-600 hover:underline truncate">제목</div>
                        <div th:text="|${#temporals.format(post.createdAt(), 'yyyy-MM-dd HH:mm:ss')}|" class="col-span-2 text-center">2026-04-07 12:00:00</div>
                        <div th:text="|${#temporals.format(post.updatedAt(), 'yyyy-MM-dd HH:mm:ss')}|" class="col-span-2 text-center">2026-04-07 12:00:00</div>
                        <div th:text="|${post.views()}|" class="col-span-1 text-center">1</div>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-10 right-10 flex justify-end gap-2 mx-2">
                <button id="write-button" class="px-2.5 py-1 text-xl text-white bg-indigo-500 hover:text-white hover:bg-indigo-400 hover:border-indigo-400 rounded-md font-medium transition-all hover:cursor-pointer active:scale-95 duration-200 select-none">
                    글 쓰기
                </button>
            </div>
        </div>
    </main>
    <th:block layout:fragment="script">
        <script th:src="@{/js/backoffice/post/post.js}"></script>
    </th:block>
</html>
