<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{backoffice/layouts/default_layout}" lang="kr" class="scroll-smooth" data-theme="">
    <main layout:fragment="content" class="p-4 flex flex-col">

        <div th:replace="'backoffice/fragments/content/content_heading' :: pageHeadingFragment('카테고리', '블로그의 카테고리를 관리하세요')"></div>

        <div class="categories-container bg-backoffice-secondary border border-backoffice-border rounded-2xl flex-1 flex flex-col shadow-sm">

            <div class="categories-header flex items-center justify-between px-6 py-5 border-b border-b-backoffice-border">
                <h3 class="flex items-center gap-2.5 text-lg font-semibold text-backoffice-text-primary m-0">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-backoffice-text-tertiary">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    모든 카테고리
                </h3>
                <span class="categories-count px-3 py-1 bg-[#6366f11a] text-backoffice-accent-primary rounded-lg text-sm font-semibold" id="categoryListCount">0개</span>
            </div>

            <div class="category-grid-new h-full grid grid-rows-[1fr_auto] gird-cols-[repeat(auto-fill,minmax(280px,1fr))] gap-4 p-6" id="categoryGridContainer">
                <div class="p-2">
                    <div class="grid grid-cols-1 sm:grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-3">
                        <div th:each="num: ${#numbers.sequence(1,28)}" class="flex items-center gap-3 px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl hover:bg-white hover:shadow-sm hover:border-indigo-200 transition-all">
                            <span class="text-xl">😊</span>

                            <div class="flex-1 min-w-0">
                                <h3 class="text-sm font-semibold text-gray-900 truncate">카테고리명</h3>
                                <p class="text-xs text-gray-500">100개 게시글</p>
                            </div>

                            <div class="flex items-center gap-1 border-l border-gray-200 pl-3 ml-2">
                                <button class="px-2.5 py-1 text-xs text-indigo-600 hover:text-white hover:bg-indigo-500 border border-indigo-200 hover:border-indigo-500 rounded-md font-medium transition-all hover:cursor-pointer">수정</button>
                                <button class="px-2.5 py-1 text-xs text-red-500 hover:text-white hover:bg-red-500 border border-red-200 hover:border-red-500 rounded-md font-medium transition-all hover:cursor-pointer">삭제</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end w-full p-2">
                    <div class="w-16 h-16 flex justify-center items-center bg-linear-to-br from-violet-500 to-fuchsia-500 rounded-full text-white font-semibold shadow-lg hover:-translate-y-1 hover:shadow-lg hover:shadow-violet-500/30 hover:cursor-pointer transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-8">
                            <path fill-rule="evenodd" d="M12 3.75a.75.75 0 0 1 .75.75v6.75h6.75a.75.75 0 0 1 0 1.5h-6.75v6.75a.75.75 0 0 1-1.5 0v-6.75H4.5a.75.75 0 0 1 0-1.5h6.75V4.5a.75.75 0 0 1 .75-.75Z" clip-rule="evenodd" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>
<!--        <div class="fixed top-0 left-0 w-dvw h-dvh bg-black/50 z-50"></div>-->
    </main>
    <script th:src="@{/js/backoffice/views/category/category.js}"></script>
</html>
