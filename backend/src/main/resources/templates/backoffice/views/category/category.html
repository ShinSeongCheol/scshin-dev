<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{backoffice/layouts/default_layout}" lang="kr" class="scroll-smooth" data-theme="">
    <main layout:fragment="main">
        <section class="">

        </section>

        <div class="page-header page-header-card">
            <div class="page-header-left">
                <h1 class="page-title">
                    <span class="page-title-icon">🏷️</span>
                    태그 관리
                </h1>
                <p class="page-subtitle">블로그 태그를 관리하세요</p>
            </div>
        </div>

        <div class="tags-container">
            <div class="tags-header">
                <h3>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2">
                        <path
                                d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z">
                        </path>
                        <line x1="7" y1="7" x2="7.01" y2="7"></line>
                    </svg>
                    모든 태그
                </h3>
                <span class="tags-count" id="tagListCount">0개</span>
            </div>
            <div class="tag-grid" id="tagGridContainer">
                <!-- 태그 카드들이 여기에 렌더링됩니다 -->
            </div>

            <!-- Empty 상태 -->
            <div class="empty-state" id="emptyTags" style="display: none;">
                <div class="empty-state-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="1">
                        <path
                                d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z">
                        </path>
                        <line x1="7" y1="7" x2="7.01" y2="7"></line>
                    </svg>
                </div>
                <h3>태그가 없습니다</h3>
                <p>첫 번째 태그를 만들어 글을 분류해보세요!</p>
                <button class="btn-primary" onclick="showTagModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                    첫 태그 만들기
                </button>
            </div>
        </div>
    </main>
    <script th:src="@{/js/backoffice/views/category/category.js}"></script>
</html>
