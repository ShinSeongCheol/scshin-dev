<html  xmlns:th="http://www.thymeleaf.org" lang="kr">
    <section class="main-content py-0 px-0 pb-20" th:fragment="postSectionFragment">
        <div class="container max-w-7xl mx-auto my-0 px-6 py-0">
            <!-- 게시글 그리드 -->
            <div class="posts-grid grid grid-cols-1 md:grid-cols-[repeat(auto-fill,minmax(340px,1fr))] gap-6" id="postsGrid">
                <article class="post-card  group bg-bg-secondary rounded-2xl overflow-hidden border border-post-border transition-all duration-300 ease-in cursor-pointer hover:transform hover:-translate-y-1 hover:shadow-[var(--shadow-post),var(--shadow-glow)] hover:border-accent_primary" data-post-id="">
                    <div class="post-card-image relative h-50 overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1627398242454-45a1465c2479?w=600&h=400&fit=crop" alt="카테고리" loading="lazy" class="w-full h-full object-cover transition-transform duration-500 ease-in group-hover:scale-105">
                        <span class="post-card-category absolute top-4 left-4 px-3 py-1.5 rounded-lg text-xs font-semibold uppercase tracking-[0.5px] text-white bg-blue-400">카테고리</span>
                    </div>
                    <div class="post-card-content p-6">
                        <h2 class="post-card-title text-xl font-semibold mb-3 leading-snug line-clamp-2 overflow-hidden">JavaScript 비동기 처리의 모든 것: Promise부터 async/await까지</h2>
                        <p class="post-card-excerpt text-sm text-secondary mb-4 line-clamp-3 overflow-hidden">자바스크립트에서 비동기 처리를 다루는 다양한 방법을 알아봅니다. 콜백 지옥을 벗어나 깔끔한 코드를 작성하는 방법을 배워보세요.</p>
                        <div class="post-card-meta flex items-center justify-between text-xs text-tertiary">
                            <span>2026년 1월 20일</span>
                            <span>8분 읽기</span>
                        </div>
                    </div>
                </article>
            </div>

            <!-- 빈 상태 -->
            <div class="empty-state hidden" id="emptyState">
                <div class="empty-icon">📭</div>
                <h3>게시글을 찾을 수 없습니다</h3>
                <p>다른 검색어나 카테고리를 시도해보세요.</p>
            </div>
        </div>
    </section>
</html>
