<html  xmlns:th="http://www.thymeleaf.org" lang="kr">
    <section class="main-content py-0 px-0 pb-20" th:fragment="postSectionFragment">
        <div class="container max-w-7xl mx-auto my-0 px-6 py-0">

            <!-- 게시글 그리드 -->
            <div id="postsGrid" class="grid grid-cols-1 md:grid-cols-[repeat(auto-fill,minmax(340px,1fr))] gap-6">
                <!-- 빈 상태 -->
                <div th:if="${#lists.isEmpty(postResponseList)}" id="emptyState" class="group bg-bg-secondary rounded-2xl overflow-hidden border border-post-border transition-all duration-300 cursor-pointer hover:transform hover:-translate-y-1 hover:shadow-[var(--shadow-post),var(--shadow-glow)] hover:border-accent_primary" >
                    <div class="p-6">
                        <h3>게시글을 찾을 수 없습니다</h3>
                        <p>다른 검색어나 카테고리를 시도해보세요.</p>
                    </div>
                </div>

                <article th:unless="${#lists.isEmpty(postResponseList)}" th:each="post: ${postResponseList}" class="group bg-bg-secondary rounded-2xl overflow-hidden border border-post-border transition-all duration-300 cursor-pointer hover:transform hover:-translate-y-1 hover:shadow-[var(--shadow-post),var(--shadow-glow)] hover:border-accent_primary" data-post-id="">
                    <div class="relative h-50 overflow-hidden">
                        <img th:src="${post.thumbnailUrl}" alt="카테고리" loading="lazy" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                        <span class="post-card-category absolute top-4 left-4 px-3 py-1.5 rounded-lg text-xs font-semibold uppercase tracking-[0.5px] text-white bg-blue-400">카테고리</span>
                    </div>
                    <div class="p-4">
                        <h2 th:text="${post.title}" class="text-xl text-primary font-semibold leading-snug line-clamp-2 overflow-hidden transition-colors duration-300">JavaScript 비동기 처리의 모든 것: Promise부터 async/await까지</h2>
                        <p th:utext="${post.content}" class="mt-2 text-sm text-secondary line-clamp-3 overflow-hidden transition-colors duration-300">자바스크립트에서 비동기 처리를 다루는 다양한 방법을 알아봅니다. 콜백 지옥을 벗어나 깔끔한 코드를 작성하는 방법을 배워보세요.</p>
                        <div class="mt-2 flex items-center justify-end text-xs text-tertiary transition-colors duration-300">
                            <span th:text="|${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm:ss')}|">2026년 1월 20일</span>
                        </div>
                    </div>
                </article>
            </div>
        </div>
    </section>
</html>
